version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: trustilock-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../apps/api/.env
    environment:
      NODE_ENV: development
      PORT: "8000"
      DATABASE_URL: mongodb://mongodb:27017/trustilock
    depends_on:
      - mongodb
    volumes:
      - ../apps/api/src:/app/apps/api/src

volumes:
  mongo-data:
